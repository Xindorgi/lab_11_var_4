services:
  go-app:
    build:
      context: ./go-app
      dockerfile: Dockerfile
    container_name: go-app
    ports:
      - "8080:8080"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "/app", "-health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    stop_grace_period: 10s

  python-app:
    build:
      context: ./python-app
      dockerfile: Dockerfile
    container_name: python-app
    ports:
      - "8000:8000"
    networks:
      - app-net
    depends_on:
      go-app:
        condition: service_healthy
    environment:
      - GO_APP_URL=http://go-app:8080/time
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    stop_grace_period: 10s

networks:
  app-net:
    driver: bridge